version: '3.4'

services:
  identity-redis:
   image: redis
   ports:
    - 6379:6379

  identity-redis-insights:
   image: redis/redisinsight:latest
   container_name: identity-redis-insight
   ports:
    - 5540:5540 
  
  identity-prometheus:
     image: prom/prometheus:latest
     container_name: identity-prometheus
     ports:
      - "9090:9090"
     volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
     command:
      - "--config.file=/etc/prometheus/prometheus.yml"
     networks:
      - observability

  identity-grafana:
    image: grafana/grafana:latest
    container_name: identity-grafana
    ports:
     - "3000:3000"
    depends_on:
     - identity-prometheus
    networks:
     - observability
  zipkin:
   image: openzipkin/zipkin
   container_name: identity-zipkin
   ports:
    - "9411:9411"
   networks:
    - observability

  promtail:
   image: grafana/promtail:2.9.4
   container_name: identity-promtail
   volumes:
     - /var/run/docker.sock:/var/run/docker.sock
     - ${PWD}/docker/promtail/promtail.yml:/etc/promtail/promtail.yml
   command: -config.file=/etc/promtail/promtail.yml
   depends_on:
     - loki
   networks:
     - observability

  loki:
   image: grafana/loki:2.9.4
   container_name: identity-loki
   platform: linux/amd64
   ports:
    - "3100:3100"
   command: -config.file=/etc/loki/loki.yml
   volumes:
    - ./docker/loki/loki.yml:/etc/loki/loki.yml
    - loki-data:/loki
   networks:
    - observability

volumes:
 loki-data:


networks:
  observability:
   driver: bridge

