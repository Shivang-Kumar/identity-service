version: '3.4'

services:
  identity-redis:
   image: redis
   ports:
    - 6379:6379

  identity-redis-insights:
   image: redis/redisinsight:latest
   container_name: identity-redis-insight
   ports:
    - 5540:5540 
  
  prometheus:
     image: prom/prometheus:latest
     container_name: prometheus
     ports:
      - "9090:9090"
     volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
     command:
      - "--config.file=/etc/prometheus/prometheus.yml"
     networks:
      - observability

